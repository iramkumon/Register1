<!DOCTYPE html>
<html>
<head>
    <title>Punch In/Punch Out Register System</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { width: 50%; margin: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background-color: #f2f2f2; }
        .paid { color: green; }
        .not-paid { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Punch In/Punch Out Register</h1>
        <label for="fee">Enter Fee:</label>
        <input type="number" id="fee" placeholder="Fee"/>
        <button id="punchInBtn">Punch In</button>
        <button id="punchOutBtn">Punch Out</button>
        <h2>Log</h2>
        <table id="logTable">
            <tr>
                <th>Action</th>
                <th>Time</th>
                <th>Status</th>
            </tr>
        </table>
    </div>

    <script>
        const logTable = document.getElementById('logTable');
        let logData = JSON.parse(localStorage.getItem('logData')) || [];

        function updateTable() {
            logTable.innerHTML = '<tr><th>Action</th><th>Time</th><th>Status</th></tr>';
            logData.forEach(entry => {
                const row = logTable.insertRow();
                const actionCell = row.insertCell(0);
                const timeCell = row.insertCell(1);
                const statusCell = row.insertCell(2);
                actionCell.innerHTML = entry.action;
                timeCell.innerHTML = entry.time;
                statusCell.innerHTML = entry.paid ? '<span class="paid">Paid</span>' : '<span class="not-paid">Not Paid</span>';
            });
        }

        document.getElementById('punchInBtn').onclick = function () {
            const fee = document.getElementById('fee').value;
            const time = new Date().toISOString();
            logData.push({ action: 'Punch In', time: time, paid: fee > 0 });
            localStorage.setItem('logData', JSON.stringify(logData));
            updateTable();
        };

        document.getElementById('punchOutBtn').onclick = function () {
            const time = new Date().toISOString();
            logData.push({ action: 'Punch Out', time: time, paid: false });
            localStorage.setItem('logData', JSON.stringify(logData));
            updateTable();
        };

        // Initialize the table with existing data
        updateTable();
    </script>
</body>
</html>
