        function showFeeSelectionModal() {
            // Code to show fee selection modal
            const modalHtml = `
                <div id='fee-selection-modal'>
                    <h2>Select Fee</h2>
                    <button onclick="selectFee(75)">£75</button>
                    <button onclick="selectFee(150)">£150</button>
                </div>
            `;
            document.body.innerHTML += modalHtml;
        }

        function selectFee(fee) {
            selectedFee = fee;
            document.getElementById('fee-selection-modal').remove();
            displayStudentCards();
        }

        function displayStudentCards() {
            const studentContainer = document.getElementById('student-container');
            students.forEach(student => {
                const card = document.createElement('div');
                card.innerHTML = `<h3>${student}</h3><p>Fee: £${selectedFee}</p>`;
                studentContainer.appendChild(card);
            });
        }

        window.onload = function() {
            showFeeSelectionModal();
        };
