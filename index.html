<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Class Check-In Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .student-card { transition: all 0.2s; }
        .checked-in { border-left: 4px solid #22c55e !important; background-color: #f0fdf4; }
        .modal { transition: opacity 0.25s ease; }
        .modal-hidden { visibility: hidden; opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans pb-24">

    <!-- Header -->
    <div class="bg-indigo-600 p-6 rounded-b-[2.5rem] shadow-lg mb-6 text-center">
        <h1 class="text-white text-2xl font-bold">Attendance Tracker</h1>
        <p class="text-indigo-100 text-sm mt-1" id="currentDate"></p>
    </div>

    <!-- Quick Stats -->
    <div class="px-4 grid grid-cols-2 gap-4 mb-6">
        <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-green-500 text-center">
            <p class="text-gray-400 text-xs uppercase font-bold tracking-wider">Present</p>
            <p id="presentCount" class="text-2xl font-black text-gray-800">0</p>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-amber-500 text-center">
            <p class="text-gray-400 text-xs uppercase font-bold tracking-wider">Fees Collected</p>
            <p id="feeCount" class="text-2xl font-black text-gray-800">£0</p>
        </div>
    </div>

    <!-- Student List Container -->
    <div class="px-4 space-y-3" id="studentContainer">
        <!-- Cards will be injected here by JavaScript -->
    </div>

    <!-- Modal for Adding/Editing -->
    <div id="studentModal" class="modal modal-hidden fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <h2 id="modalTitle" class="text-xl font-bold text-gray-800 mb-4">Add Student</h2>
            <input type="hidden" id="editId">
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">Student Name</label>
                    <input type="text" id="studentNameInput" placeholder="Enter name..." 
                        class="w-full mt-1 p-3 bg-gray-100 rounded-xl border-none focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="closeModal()" class="flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl">Cancel</button>
                    <button onclick="saveStudent()" class="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-200">Save</button>
                </div>
                <button id="deleteBtn" onclick="deleteStudent()" class="w-full text-red-500 text-sm font-medium pt-2 hidden">Delete Student</button>
            </div>
        </div>
    </div>

    <!-- Bottom Action Bar -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t p-4 flex justify-around items-center z-50">
        <button onclick="location.reload()" class="text-indigo-600 flex flex-col items-center">
            <i class="fa-solid fa-house-user text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">HOME</span>
        </button>
        <button onclick="openModal()" class="bg-indigo-600 w-14 h-14 rounded-2xl shadow-lg shadow-indigo-200 -mt-12 flex items-center justify-center text-white border-4 border-slate-50">
            <i class="fa-solid fa-plus text-xl"></i>
        </button>
        <button onclick="resetData()" class="text-gray-400 flex flex-col items-center">
            <i class="fa-solid fa-rotate text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">RESET</span>
        </button>
    </div>

    <script>
        let students = [
            { id: 1, name: "Alex Johnson", present: false, feePaid: false, time: "NOT CHECKED IN" },
            { id: 2, name: "Sarah Williams", present: false, feePaid: false, time: "NOT CHECKED IN" }
        ];

        // Initialize
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
        renderStudents();

        function renderStudents() {
            const container = document.getElementById('studentContainer');
            container.innerHTML = '';
            let presentTotal = 0;
            let feesTotal = 0;

            students.forEach(s => {
                if(s.present) presentTotal++;
                if(s.feePaid) feesTotal += 50;

                const card = document.createElement('div');
                card.className = `student-card bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between ${s.present ? 'checked-in' : ''}`;
                card.innerHTML = `
                    <div onclick="toggleCheck(${s.id})" class="flex-1 cursor-pointer">
                        <h3 class="font-bold text-gray-800 text-lg">${s.name}</h3>
                        <p class="text-gray-400 text-[10px] font-bold uppercase tracking-tighter">${s.time}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="openModal(${s.id})" class="text-gray-300 hover:text-indigo-400 p-2">
                            <i class="fa-solid fa-pen-to-square text-sm"></i>
                        </button>
                        <button onclick="toggleFee(${s.id})" class="w-10 h-10 rounded-xl border-2 flex items-center justify-center transition-all ${s.feePaid ? 'border-green-600 text-green-600 bg-green-50' : 'border-gray-100 text-gray-200'}">
                            <i class="fa-solid fa-sterling-sign"></i>
                        </button>
                        <div class="w-2 h-2 rounded-full ${s.present ? 'bg-green-500' : 'bg-gray-200'}"></div>
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('presentCount').innerText = presentTotal;
            document.getElementById('feeCount').innerText = "£" + feesTotal;
        }

        // --- Logic Functions ---

        function toggleCheck(id) {
            const s = students.find(x => x.id === id);
            s.present = !s.present;
            s.time = s.present ? "ARRIVED AT " + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "NOT CHECKED IN";
            renderStudents();
        }

        function toggleFee(id) {
            const s = students.find(x => x.id === id);
            s.feePaid = !s.feePaid;
            renderStudents();
        }

        // --- Modal & Editing Functions ---

        function openModal(id = null) {
            const modal = document.getElementById('studentModal');
            const title = document.getElementById('modalTitle');
            const input = document.getElementById('studentNameInput');
            const deleteBtn = document.getElementById('deleteBtn');
            const editId = document.getElementById('editId');

            modal.classList.remove('modal-hidden');
            
            if (id) {
                const s = students.find(x => x.id === id);
                title.innerText = "Edit Student";
                input.value = s.name;
                editId.value = id;
                deleteBtn.classList.remove('hidden');
            } else {
                title.innerText = "Add New Student";
                input.value = "";
                editId.value = "";
                deleteBtn.classList.add('hidden');
            }
            input.focus();
        }

        function closeModal() {
            document.getElementById('studentModal').classList.add('modal-hidden');
        }

        function saveStudent() {
            const name = document.getElementById('studentNameInput').value;
            const id = document.getElementById('editId').value;

            if (!name.trim()) return alert("Please enter a name");

            if (id) {
                // Update existing
                const s = students.find(x => x.id == id);
                s.name = name;
            } else {
                // Add new
                students.push({
                    id: Date.now(),
                    name: name,
                    present: false,
                    feePaid: false,
                    time: "NOT CHECKED IN"
                });
            }
            closeModal();
            renderStudents();
        }

        function deleteStudent() {
            const id = document.getElementById('editId').value;
            if(confirm("Remove this student from the list?")) {
                students = students.filter(x => x.id != id);
                closeModal();
                renderStudents();
            }
        }

        function resetData() {
            if(confirm("Reset all check-ins and fees?")) {
                students.forEach(s => {
                    s.present = false;
                    s.feePaid = false;
                    s.time = "NOT CHECKED IN";
                });
                renderStudents();
            }
        }
    </script>
</body>
</html>
